<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel — On-Chain Stop-Loss Guardian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              bg: "#0a0c10",
              surface: "#12151c",
              surface2: "#171b24",
              border: "#232a38",
              border2: "#313a4d",
              fg: "#e7eaf0",
              muted: "#9aa4b6",
              faint: "#8b93a4",
              brand: { DEFAULT: "#4f8dff", hover: "#6ba0ff", soft: "#16233f" },
              success: "#22c55e",
              danger: "#f87171",
              warn: "#f59e0b",
            },
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "Menlo", "monospace"],
            },
          },
        },
      };
    </script>
    <style>
      :root { color-scheme: dark; }
      html, body { background: #0a0c10; }
      body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; font-family: Inter, system-ui, sans-serif; }
      .tnum { font-variant-numeric: tabular-nums; }
      /* visible, consistent focus ring on every interactive element */
      :where(button, a, input, select, [tabindex]):focus-visible {
        outline: none; box-shadow: 0 0 0 2px #000, 0 0 0 4px rgba(255,255,255,.7);
      }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #232a38; border-radius: 8px; border: 2px solid #0a0c10; }
      ::-webkit-scrollbar-thumb:hover { background: #313a4d; }
      @media (prefers-reduced-motion: no-preference) {
        .anim { transition: all .18s cubic-bezier(.4,0,.2,1); }
        @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .rise { animation: rise .35s cubic-bezier(.16,1,.3,1) both; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .skel { position: relative; overflow: hidden; }
        .skel::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%);
          background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent); animation: shimmer 1.4s infinite; }
        @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
        .live-dot { animation: pulse-dot 1.6s ease-in-out infinite; }
      }
      /* tame the wallet-adapter modal to our black palette */
      .wallet-adapter-modal-wrapper { background: #000 !important; border: 1px solid rgba(255,255,255,.12); border-radius: 0 !important; }
      .wallet-adapter-modal-title { color: #fff !important; }
      .wallet-adapter-button { font-family: Inter, sans-serif !important; }
    </style>
  </head>
  <body class="text-fg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
